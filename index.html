<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

        <header>
            <h1>Visual<span>Voyage</span></h1>
            <p>Explore the beauty of the world through our lens</p>

                <button class="btn" onclick="filterSelection('architecture')">Architecture</button>
                <button class="btn" onclick="filterSelection('tech')">Technology</button>

        </header>
